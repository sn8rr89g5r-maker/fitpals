{% extends "base.html" %}
{% block title %}Checkout{% endblock %}
{% block content %}
<div class="page-hero" style="padding:40px 24px;"><h1>Checkout</h1><p>Almost done! Choose your payment method.</p></div>
<div class="container-sm">
  <form method="POST" action="/checkout">
    <div class="card" style="padding:24px;margin-bottom:16px;">
      <div style="font-family:'Familjen Grotesk',sans-serif;font-size:17px;font-weight:700;margin-bottom:16px;">Delivery Address</div>
      <div class="form-group">
        <label class="form-label">Full Address</label>
        <input class="form-input" name="address" required placeholder="House/Flat, Road, Area, City…">
      </div>
    </div>
    <div class="card" style="padding:24px;margin-bottom:16px;">
      <div style="font-family:'Familjen Grotesk',sans-serif;font-size:17px;font-weight:700;margin-bottom:16px;">Payment Method</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <label style="cursor:pointer;"><input type="radio" name="payment_method" value="bkash" checked style="display:none;"> <span class="pay-chip selected" id="pay-bkash">💚 bKash</span></label>
        <label style="cursor:pointer;"><input type="radio" name="payment_method" value="nagad" style="display:none;"> <span class="pay-chip" id="pay-nagad">🟠 Nagad</span></label>
        <label style="cursor:pointer;"><input type="radio" name="payment_method" value="rocket" style="display:none;"> <span class="pay-chip" id="pay-rocket">🟣 Rocket</span></label>
        <label style="cursor:pointer;"><input type="radio" name="payment_method" value="card" style="display:none;"> <span class="pay-chip" id="pay-card">💳 Card</span></label>
      </div>
    </div>
    <div class="card" style="padding:24px;margin-bottom:24px;">
      <div style="display:flex;justify-content:space-between;font-size:16px;font-weight:700;">
        <span>Total ({{ cart_count }} items)</span><span style="color:var(--accent);">৳{{ total }}</span>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px;">Delivery: {% if total >= 999 %}Free!{% else %}৳60{% endif %}</div>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;font-size:16px;padding:15px;">✅ Confirm Order</button>
  </form>
</div>
<script>
document.querySelectorAll('input[name="payment_method"]').forEach(r => {
  r.addEventListener('change', () => {
    document.querySelectorAll('.pay-chip').forEach(c => c.classList.remove('selected'));
    document.getElementById('pay-' + r.value).classList.add('selected');
  });
});
</script>
{% endblock %}
