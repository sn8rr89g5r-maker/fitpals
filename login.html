{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="page-hero" style="padding:40px 24px;"><h1>Welcome Back</h1><p>Log in to your FitPals account.</p></div>
<div class="container-sm">
  <div class="card" style="padding:32px;">
    <form method="POST" action="/login">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" name="email" required placeholder="you@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password" required placeholder="Your password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;font-size:15px;padding:13px;margin-top:8px;">Log In →</button>
    </form>
    <div style="text-align:center;margin-top:20px;font-size:14px;color:var(--muted);">
      Don't have an account? <a href="/register" style="color:var(--accent);font-weight:600;">Sign up free</a>
    </div>
  </div>
  <div style="text-align:center;margin-top:16px;font-size:12px;color:var(--muted2);">
    Demo: register a new account to get started instantly.
  </div>
</div>
{% endblock %}
